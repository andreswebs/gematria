---
name: Build

on:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  validate:
    uses: ./.github/workflows/validate.dispatch.yaml

  build:
    needs: [validate]
    uses: ./.github/workflows/build.dispatch.yaml
    permissions:
      contents: write
      id-token: write
      attestations: write

  release:
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Validate tag format
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          if [[ ! "${VERSION}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$ ]]; then
            echo "::error::Tag '${VERSION}' is not a canonical Go module version (vMAJOR.MINOR.PATCH[-PRERELEASE])." >&2
            exit 1
          fi

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact-name }}
          path: dist

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ github.ref_name }}
        run: |
          gh release create "${VERSION}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${VERSION}" \
            --generate-notes \
            dist/*.tar.gz dist/*.zip dist/SHA256SUMS.txt
